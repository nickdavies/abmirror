# Copy in dst:recv should have updated payee, notes, and cleared from source.
# Global sort: (dst, recv) < (src, checking)
#   TX-1: dst:recv copy (updated)
#   TX-2: src:checking source

budgets:
  dst:
    accounts:
      recv:
        transactions:
          - date: "2025-01-15"
            amount: -10000
            payee_name: Updated Payee
            notes: "Updated notes"
            category: null
            cleared: true
            imported_id: "ABMirror:src:TX-2"
  src:
    accounts:
      checking:
        transactions:
          - date: "2025-01-15"
            amount: -10000
            payee_name: Updated Payee
            notes: "Updated notes"
            category: null
            cleared: true
            imported_id: null
