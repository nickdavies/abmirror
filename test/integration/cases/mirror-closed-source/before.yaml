# Closed-account handling: src:checking is closed (has a tx from a previous run),
# src:savings is open (has a tx). dst:recv has an existing copy of the closed-
# account tx from a prior run.
#
# Expected: closed account excluded from source scan (no new copy created),
# but its tx remains in rootTxIndex so the existing copy is NOT deleted.

budgets:
  dst:
    accounts:
      recv:
        transactions:
          - id: TX-1
            date: "2025-01-10"
            amount: -5000
            payee_name: Old Coffee
            notes: null
            category: null
            cleared: null
            imported_id: "ABMirror:src:TX-2"
            subs: []
  src:
    accounts:
      checking:
        closed: true
        transactions:
          - id: TX-2
            date: "2025-01-10"
            amount: -5000
            payee_name: Old Coffee
            notes: null
            category: null
            cleared: null
            imported_id: null
            subs: []
      savings:
        transactions:
          - id: TX-3
            date: "2025-01-15"
            amount: -10000
            payee_name: Lunch
            notes: null
            category: null
            cleared: null
            imported_id: null
            subs: []
